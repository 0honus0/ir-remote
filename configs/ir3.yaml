esphome:
  name: ir-remote
  name_add_mac_suffix: true
  includes:
    - ../components/universal_ac_climate/universal_ac.h
    - ac_state_manager.h
  platformio_options:
    lib_deps:
      - https://github.com/crankyoldgit/IRremoteESP8266.git#v2.9.0
  on_boot:
    - priority: 600
      then:
        - output.turn_off: led_red
        - output.turn_off: led_yellow
        - output.turn_off: led_blue
        - if:
            condition:
              wifi.connected:
            then:
              - script.execute: led_wifi_flash
            else:
              - script.execute: led_wifi_missing_blink
    - priority: -100
      then:
        - component.update: firmware_version

esp8266:
  board: esp12e

external_components:
  - source:
      type: local
      path: ../components
    components: [universal_ac_controller, universal_ac_climate]

wifi:
  ssid: "honus_2.4G"
  password: "honushonus"
  ap:  # ïżœïżœÒ»ïżœïżœïżœïżœïżœïżœWiFiïżœïżœïżœïżœïżœïżœïżœÈ”ă·œïżœïżœïżœŚ©
    ssid: "honus-fallback"
    password: "12345678"
    # The fallback AP only starts after station association fails. Keep this
    # short so a powered-off/unavailable router can be recovered quickly.
    ap_timeout: 15s
  on_connect:
    then:
      - lambda: 'id(wifi_status) = "ïżœïżœïżœïżœïżœïżœ";'
      - component.update: current_wifi_ssid
      - script.stop: led_wifi_missing_blink
      - script.stop: led_error_flash
      # Stopping a script during its delay leaves the GPIO at its last level.
      - output.turn_off: led_red
      - script.execute: led_wifi_flash
  on_disconnect:
    then:
      - lambda: 'id(wifi_status) = "ïżœïżœïżœïżœïżœŃ¶Ïżïżœ";'
      - script.execute: led_error_flash
      - script.execute: led_wifi_missing_blink

captive_portal:

logger:
  baud_rate: 74880  # ïżœŰŒïżœïżœïżœïżœÇ±ïżœŚŒïżœïżœïżœïżœïżœïżœ

api:

