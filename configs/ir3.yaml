    id: ac_sleep
    optimistic: true
    restore_value: false
    initial_value: 0
    min_value: 0
    max_value: 720
    step: 1
    mode: box
    set_action:
      - lambda: |-
          id(ac_controller).set_timer(x);
          if (x > 0) {
            ESP_LOGI("ac_timer", "Shutdown timer set for %.0f minutes.", x);
          } else {
            ESP_LOGI("ac_timer", "Shutdown timer cancelled.");
          }
      - script.execute: led_action_flash

