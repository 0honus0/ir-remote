# ïżœïżœïżœïżœïżœïżœŐ±ïżœïżœïżœïżœïżœïżœïżœïżœïżœÖŸïżœïżœÏĄïżœ
remote_receiver:
  id: remote_rx
  pin:
    number: GPIO5
    inverted: true
  dump: all
  on_raw:
    then:
      - script.execute: led_ir_receive_flash

# ïżœïżœÊ§ïżœïżœïżœïżœŚŽÌŹïżœïżœïżœïżœĐŽïżœïżœ EEPROMïżœïżœ
globals:
  - id: wifi_ssid_pending
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: wifi_password_pending
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: wifi_status
    type: std::string
    restore_value: no
    initial_value: '"ÊčïżœïżœïżœïżœïżœïżœïżœÄŒïżœïżœĐ”ïżœ WiFi"'

# LED ćźäčăææ LED é»èź€ćłé­ïŒæèżèĄäșä»¶ç­ææç€șă
output:
  - platform: gpio
    pin:
      number: GPIO12
      inverted: true
    id: led_red        # ïżœïżœÉ« ïżœïżœ GPIO12

  - platform: gpio
    pin:
      number: GPIO13
      inverted: true
    id: led_yellow     # ïżœïżœÉ« ïżœïżœ GPIO13

  - platform: gpio
    pin:
      number: GPIO2
      inverted: true
    id: led_blue

script:
  - id: led_action_flash
    mode: restart
    then:
      - output.turn_on: led_yellow
      - delay: 120ms
      - output.turn_off: led_yellow

  - id: led_ir_send_flash
    mode: restart
    then:
      - output.turn_on: led_yellow
      - delay: 80ms
      - output.turn_off: led_yellow

  - id: led_wifi_flash
    mode: restart
    then:
      - output.turn_on: led_blue
      - delay: 150ms
      - output.turn_off: led_blue

  - id: led_ir_receive_flash
    mode: restart
    then:
      - output.turn_on: led_blue
      - delay: 70ms
      - output.turn_off: led_blue

  - id: led_wifi_missing_blink
    mode: restart
    then:
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - output.turn_on: led_red
            - delay: 180ms
            - output.turn_off: led_red
            - delay: 1800ms
      - delay: 100ms
      - output.turn_on: led_blue
      - delay: 150ms
      - output.turn_off: led_blue

  - id: led_error_flash
    mode: restart
    then:
      - output.turn_on: led_red
      - delay: 250ms
      - output.turn_off: led_red

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ac_controller).timer_expired();'
          then:
            - lambda: 'ESP_LOGI("ac_timer", "Shutdown timer expired; turning AC off.");'
            - climate.control:
                id: ha_universal_ac
                mode: "OFF"

sensor:
  - platform: template
    id: ir_send_event
    internal: true
    update_interval: 100ms
    lambda: 'return static_cast<float>(id(ac_controller).send_sequence());'
    on_value:
      - lambda: |-
          static uint32_t previous = 0;
          const auto current = static_cast<uint32_t>(x);
          if (current != previous && current != 0) id(led_ir_send_flash).execute();
          previous = current;

text_sensor:
  - platform: template
    name: "ïżœïżœÇ° WiFi ïżœïżœïżœïżœ [wifi_current]"
    id: current_wifi_ssid
    lambda: |-
      if (!wifi::global_wifi_component->is_connected()) return {"ÎŽïżœïżœïżœïżœ"};
      std::array<char, wifi::SSID_BUFFER_SIZE> ssid{};
      return std::string(wifi::global_wifi_component->wifi_ssid_to(ssid));
    update_interval: never

  - platform: template
    name: "çșąć€ç¶æ [ir_status]"
    id: ir_status
    update_interval: never

  - platform: template
    name: "ćșä»¶çæŹ [firmware_version]"
    id: firmware_version
    icon: "mdi:calendar"
    lambda: 'return std::string(__DATE__);'
    update_interval: never

universal_ac_controller:
  id: ac_controller
  protocol_control: ac_protocol
  fan_control: ac_fan
  swing_control: ac_swing_v
  special_control: ac_special_mode
  timer_control: ac_sleep
  light_control: ac_display_light
  power_control: ac_power_toggle
  status_control: ir_status

climate:
