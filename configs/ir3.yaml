      sorting_weight: 10
    - id: ac_control_group
      name: "ç©șè°æ§ć¶"
      sorting_weight: 20
    - id: wifi_settings_group
      name: "WiFi ïżœïżœïżœïżœ"
      sorting_weight: 90
  
ota:
