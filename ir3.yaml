esphome:
  name: ir-remote
  name_add_mac_suffix: true
  includes:
    - universal_ac.h
  platformio_options:
    lib_deps:
      - https://github.com/crankyoldgit/IRremoteESP8266.git#v2.9.0
  on_boot:
    - priority: 600
      then:
        - output.turn_off: led_red
        - output.turn_off: led_yellow
        - output.turn_off: led_blue
        - lambda: 'ac_begin();'
        - if:
            condition:
              wifi.connected:
            then:
              - script.execute: led_wifi_flash
            else:
              - script.execute: led_wifi_missing_blink
    - priority: -100
      then:
        - lambda: |-
            id(ac_protocol).publish_state(id(ac_protocol_saved));
            ac_restore(id(ac_protocol_saved), id(ac_saved_temperature),
                       id(ac_saved_mode),
                       std::string(id(ac_fan).current_option().c_str()),
                       std::string(id(ac_swing_v).current_option().c_str()),
                       id(ac_display_light).state);
        - component.update: firmware_version

esp8266:
  board: esp12e

external_components:
  - source:
      type: local
      path: components
    components: [universal_ac_climate]

wifi:
  ssid: "honus_2.4G"
  password: "honushonus"
  ap:  # 万一连不上WiFi，开个热点方便救砖
    ssid: "honus-fallback"
    password: "12345678"
    # The fallback AP only starts after station association fails. Keep this
    # short so a powered-off/unavailable router can be recovered quickly.
    ap_timeout: 15s
  on_connect:
    then:
      - lambda: 'id(wifi_status) = "已连接";'
      - component.update: current_wifi_ssid
      - script.stop: led_wifi_missing_blink
      - script.stop: led_error_flash
      # Stopping a script during its delay leaves the GPIO at its last level.
      - output.turn_off: led_red
      - script.execute: led_wifi_flash
  on_disconnect:
    then:
      - lambda: 'id(wifi_status) = "连接已断开";'
      - script.execute: led_error_flash
      - script.execute: led_wifi_missing_blink

captive_portal:

logger:
  baud_rate: 74880  # 关键！非标准波特率

api:

web_server:
  port: 80
  version: 3
  include_internal: false
  sorting_groups:
    - id: ac_protocol_group
      name: "空调协议"
      sorting_weight: 10
    - id: ac_control_group
      name: "空调控制"
      sorting_weight: 20
    - id: wifi_settings_group
      name: "WiFi 设置"
      sorting_weight: 90
  
ota:
  - platform: esphome

# 红外接收保留用于日志诊断。
remote_receiver:
  id: remote_rx
  pin:
    number: GPIO5
    inverted: true
  dump: all
  on_raw:
    then:
      - script.execute: led_ir_receive_flash

# 易失运行状态，不写入 EEPROM。
globals:
  - id: wifi_ssid_pending
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: wifi_password_pending
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: wifi_status
    type: std::string
    restore_value: no
    initial_value: '"使用配置文件中的 WiFi"'

  # 空调关机后保留，并写入 EEPROM 供重启恢复。
  - id: ac_protocol_saved
    type: std::string
    restore_value: yes
    initial_value: '"格力_GREE_YAW1F"'
  - id: ac_saved_mode
    type: std::string
    restore_value: yes
    initial_value: '"制冷"'
  - id: ac_saved_temperature
    type: float
    restore_value: yes
    initial_value: '26.0'

# LED 定义。所有 LED 默认关闭，按运行事件短暂提示。
output:
  - platform: gpio
    pin:
      number: GPIO12
      inverted: true
    id: led_red        # 红色 → GPIO12

  - platform: gpio
    pin:
      number: GPIO13
      inverted: true
    id: led_yellow     # 黄色 → GPIO13

  - platform: gpio
    pin:
      number: GPIO2
      inverted: true
    id: led_blue

script:
  # 关机清除的数据：本机定时和特殊模式。送风方向保持不变。
  # UniversalAc 同步清除红外编码状态；本脚本仅同步 ESPHome 实体状态。
  - id: ac_clear_power_off_state
    mode: single
    then:
      - lambda: 'id(ac_sleep).publish_state(0);'
      - select.set_index:
          id: ac_special_mode
          index: 0

  - id: led_action_flash
    mode: restart
    then:
      - output.turn_on: led_yellow
      - delay: 120ms
      - output.turn_off: led_yellow

  - id: led_ir_send_flash
    mode: restart
    then:
      - output.turn_on: led_yellow
      - delay: 80ms
      - output.turn_off: led_yellow

  - id: led_wifi_flash
    mode: restart
    then:
      - output.turn_on: led_blue
      - delay: 150ms
      - output.turn_off: led_blue

  - id: led_ir_receive_flash
    mode: restart
    then:
      - output.turn_on: led_blue
      - delay: 70ms
      - output.turn_off: led_blue

  - id: led_wifi_missing_blink
    mode: restart
    then:
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - output.turn_on: led_red
            - delay: 180ms
            - output.turn_off: led_red
            - delay: 1800ms
      - delay: 100ms
      - output.turn_on: led_blue
      - delay: 150ms
      - output.turn_off: led_blue

  - id: led_error_flash
    mode: restart
    then:
      - output.turn_on: led_red
      - delay: 250ms
      - output.turn_off: led_red

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return universal_ac.timer_expired();'
          then:
            - lambda: 'ESP_LOGI("ac_timer", "Shutdown timer expired; turning AC off.");'
            - climate.control:
                id: ha_universal_ac
                mode: "OFF"

sensor:
  - platform: template
    id: ir_send_event
    internal: true
    update_interval: 100ms
    lambda: 'return static_cast<float>(universal_ac.send_sequence());'
    on_value:
      - lambda: |-
          static uint32_t previous = 0;
          const auto current = static_cast<uint32_t>(x);
          if (current != previous && current != 0) id(led_ir_send_flash).execute();
          previous = current;

text_sensor:
  - platform: template
    name: "当前 WiFi 名称 [wifi_current]"
    id: current_wifi_ssid
    lambda: |-
      if (!wifi::global_wifi_component->is_connected()) return {"未连接"};
      std::array<char, wifi::SSID_BUFFER_SIZE> ssid{};
      return std::string(wifi::global_wifi_component->wifi_ssid_to(ssid));
    update_interval: never

  - platform: template
    name: "红外状态 [ir_status]"
    lambda: 'return universal_ac.status();'
    update_interval: 1s

  - platform: template
    name: "固件版本 [firmware_version]"
    id: firmware_version
    icon: "mdi:calendar"
    lambda: 'return std::string(__DATE__);'
    update_interval: never

climate:
  - platform: universal_ac_climate
    name: "空调遥控 [ac_climate]"
    id: ha_universal_ac
    temperature_storage: ac_saved_temperature
    fan_storage: ac_fan
    swing_storage: ac_swing_v
    power_off_reset: ac_clear_power_off_state
    update_interval: 1s
    on_state:
      - lambda: |-
          switch (id(ha_universal_ac).mode) {
            case climate::CLIMATE_MODE_AUTO:
              id(ac_saved_mode) = "自动";
              break;
            case climate::CLIMATE_MODE_COOL:
              id(ac_saved_mode) = "制冷";
              break;
            case climate::CLIMATE_MODE_HEAT:
              id(ac_saved_mode) = "制热";
              break;
            case climate::CLIMATE_MODE_DRY:
              id(ac_saved_mode) = "除湿";
              break;
            case climate::CLIMATE_MODE_FAN_ONLY:
              id(ac_saved_mode) = "送风";
              break;
            default:
              break;
          }

select:
  # 关机后保留且写入 EEPROM 的空调设定。
  - platform: template
    name: "空调协议 [ac_protocol]"
    id: ac_protocol
