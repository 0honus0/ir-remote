    web_server:
      sorting_group_id: ac_protocol_group
      sorting_weight: 10
    initial_option: "格力_GREE_YAW1F"
    options:
      - "格力_GREE_自动"
      - "格力_GREE_YAW1F"
      - "格力_GREE_YBOFB"
