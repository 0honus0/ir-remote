      - "米拉奇_MIRAGE_KKG9AC1"
      - "米拉奇_MIRAGE_KKG29AC1"
      - "新气候_NEOCLIMA_自动"
      - "瑞斯_RHOSS_自动"
      - "三洋_SANYO_AC_自动"
      - "三洋_SANYO_AC88_自动"
      - "泰克尼贝尔_TECHNIBEL_AC_自动"
      - "泰科_TECO_自动"
      - "泰克诺点_TEKNOPOINT_自动"
      - "特兰斯科_TRANSCOLD_自动"
      - "特洛泰克_TROTEC_自动"
      - "特洛泰克_TROTEC_3550_自动"
      - "特鲁玛_TRUMA_自动"
      - "维斯特_VESTEL_AC_自动"
      - "沃尔塔斯_VOLTAS_自动"
      - "沃尔塔斯_VOLTAS_122LZF"
      - "约克_YORK_自动"
