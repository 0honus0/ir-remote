      - lambda: |-
          if (ac_set_protocol(x)) {
            id(ac_protocol_saved) = x;
          } else {
            id(ac_protocol).publish_state(id(ac_protocol_saved));
          }
      - script.execute: led_action_flash

  - platform: template
    name: "风速设置 [ac_fan]"
    id: ac_fan
    web_server:
      sorting_group_id: ac_control_group
      sorting_weight: 10
    optimistic: true
    restore_value: true
    initial_option: "自动"
    options: ["自动", "最小", "低", "中", "高", "最大"]
    set_action:
      - lambda: 'ac_set_fan(x);'

  # 关机清除的数据，不写入 EEPROM。
  - platform: template
    name: "特殊模式 [ac_special]"
    id: ac_special_mode
    optimistic: true
    restore_value: false
    initial_option: "正常"
    options: ["正常", "强力", "睡眠", "干燥"]
    set_action:
      - lambda: 'ac_set_special_mode(x);'
      - script.execute: led_action_flash

  - platform: template
    name: "送风方向 [ac_swing]"
    id: ac_swing_v
    optimistic: true
    restore_value: true
    initial_option: "关闭"
    options: ["关闭", "自动", "最高", "偏高", "中上", "中间", "偏低", "最低"]
    set_action:
      - lambda: 'ac_set_swing_v(x);'
      - script.execute: led_action_flash

number:
  # 关机清除的数据，不写入 EEPROM。
  - platform: template
    name: "关机定时分钟 [ac_timer]"
    id: ac_sleep
    optimistic: true
    restore_value: false
    initial_value: 0
    min_value: 0
    max_value: 720
    step: 1
    mode: box
    set_action:
      - lambda: |-
          ac_set_sleep(x);
          if (x > 0) {
            ESP_LOGI("ac_timer", "Shutdown timer set for %.0f minutes.", x);
          } else {
            ESP_LOGI("ac_timer", "Shutdown timer cancelled.");
          }
      - script.execute: led_action_flash

switch:
  # 关机后保留且写入 EEPROM 的空调设定。
  - platform: template
    name: "面板灯开关 [ac_light]"
    id: ac_display_light
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action: [lambda: 'ac_set_feature("light", true);', script.execute: led_action_flash]
    turn_off_action: [lambda: 'ac_set_feature("light", false);', script.execute: led_action_flash]

text:
  - platform: template
    name: "WiFi 名称 [wifi_setup_ssid]"
    id: wifi_ssid_input
    web_server:
      sorting_group_id: wifi_settings_group
      sorting_weight: 10
    mode: text
    optimistic: true
    restore_value: false
    initial_value: ""
    max_length: 32
    set_action:
      - lambda: 'id(wifi_ssid_pending) = x;'

  - platform: template
    name: "WiFi 密码 [wifi_setup_password]"
    id: wifi_password_input
    web_server:
      sorting_group_id: wifi_settings_group
      sorting_weight: 20
    mode: password
    optimistic: true
    restore_value: false
    initial_value: ""
    max_length: 64
    set_action:
      - lambda: 'id(wifi_password_pending) = x;'

button:
  - platform: template
    name: "保存 WiFi [wifi_save]"
    web_server:
      sorting_group_id: wifi_settings_group
      sorting_weight: 30
    on_press:
      - if:
          condition:
            lambda: 'return !id(wifi_ssid_pending).empty() && !id(wifi_password_pending).empty();'
          then:
            - lambda: 'id(wifi_status) = "正在连接新的 WiFi";'
            - wifi.configure:
                ssid: !lambda 'return id(wifi_ssid_pending);'
                password: !lambda 'return id(wifi_password_pending);'
                save: true
                timeout: 30s
                on_connect:
                  - lambda: 'id(wifi_status) = "已保存并连接";'
                  - script.execute: led_wifi_flash
                on_error:
                  - lambda: 'id(wifi_status) = "WiFi 连接失败";'
                  - script.execute: led_error_flash
          else:
            - lambda: 'id(wifi_status) = "使用配置文件中的 WiFi";'
            - script.execute: led_wifi_flash

  - platform: template
    name: "重启设备 [device_restart]"
    on_press:
      - script.execute: led_error_flash
      - delay: 300ms
      - lambda: 'App.safe_reboot();'
